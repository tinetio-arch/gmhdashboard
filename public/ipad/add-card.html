<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Card to Both Stripe Accounts</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .patient-info {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .patient-name {
            font-weight: 600;
            font-size: 18px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .patient-email {
            color: #666;
            font-size: 14px;
        }

        .accounts-badge {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .badge {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .badge-healthie {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .badge-direct {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        #card-element {
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 8px;
            transition: border-color 0.3s;
        }

        #card-element.StripeElement--focus {
            border-color: #667eea;
        }

        #card-errors {
            color: #dc2626;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cancel-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #666;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #dc2626;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .security-note {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 6px;
        }

        .security-note svg {
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Add Payment Method</h1>
        <p class="subtitle">For Direct Stripe billing (products/services)</p>

        <div class="patient-info">
            <div class="patient-name" id="patientName">Loading...</div>
            <div class="patient-email" id="patientEmail"></div>
        </div>

        <div class="accounts-badge">
            <div class="badge badge-direct">Direct Stripe Only</div>
        </div>

        <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #856404;">
            <strong>ℹ️ Note:</strong> For Healthie packages/subscriptions, add cards at <a href="https://app.gethealthie.com" target="_blank" style="color: #856404; text-decoration: underline;">app.gethealthie.com</a>
        </div>

        <div id="statusMessage"></div>

        <form id="payment-form">
            <div id="card-element"></div>
            <div id="card-errors"></div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="buttonText">Add Card to Direct Stripe</span>
            </button>

            <button type="button" class="cancel-btn" onclick="window.close()">Cancel</button>
        </form>

        <div class="security-note">
            🔒 Secured by Stripe. Your card details never touch our servers.
        </div>
    </div>

    <script>
        // Get patient info from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('patient_id');
        const patientName = urlParams.get('patient_name') || 'Patient';
        const patientEmail = urlParams.get('patient_email') || '';
        const healthieId = urlParams.get('healthie_id');

        // Display patient info
        document.getElementById('patientName').textContent = patientName;
        document.getElementById('patientEmail').textContent = patientEmail;

        // Initialize Stripe with your publishable key
        const stripe = Stripe('pk_live_51SVHOPPB2L4QIAwdvZjRY4k69EatIrhEpCD6nUatP8JGgYm6RTt6fjcXifQNp62qqdz56zSZhSPQ2IDgWW4LWHVS00BhY73GMD');

        // Create card element
        const elements = stripe.elements();
        const cardElement = elements.create('card', {
            style: {
                base: {
                    fontSize: '16px',
                    color: '#1a1a1a',
                    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                    '::placeholder': {
                        color: '#aab7c4',
                    },
                },
                invalid: {
                    color: '#dc2626',
                    iconColor: '#dc2626',
                },
            },
        });

        cardElement.mount('#card-element');

        // Handle real-time validation errors
        cardElement.on('change', (event) => {
            const displayError = document.getElementById('card-errors');
            if (event.error) {
                displayError.textContent = event.error.message;
            } else {
                displayError.textContent = '';
            }
        });

        // Handle form submission
        const form = document.getElementById('payment-form');
        const submitBtn = document.getElementById('submitBtn');
        const buttonText = document.getElementById('buttonText');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            if (!patientId || !healthieId) {
                showStatus('error', 'Missing patient information. Please close and try again.');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            buttonText.innerHTML = '<span class="spinner"></span>Processing...';
            showStatus('processing', 'Creating secure payment method...');

            try {
                // Create payment method with Stripe
                const {error, paymentMethod} = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: {
                        name: patientName,
                        email: patientEmail || undefined,
                    },
                });

                if (error) {
                    throw new Error(error.message);
                }

                showStatus('processing', 'Saving to Direct Stripe...');

                // Send payment method to backend to save to both Stripe accounts
                const response = await fetch('/ops/api/ipad/billing/add-card-dual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        patient_id: patientId,
                        healthie_id: healthieId,
                        payment_method_id: paymentMethod.id,
                        card_details: {
                            brand: paymentMethod.card.brand,
                            last4: paymentMethod.card.last4,
                            exp_month: paymentMethod.card.exp_month,
                            exp_year: paymentMethod.card.exp_year,
                        },
                    }),
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Failed to save card');
                }

                // Success!
                showStatus('success', `✅ Card added to Direct Stripe! (${paymentMethod.card.brand.toUpperCase()} ****${paymentMethod.card.last4})`);
                buttonText.textContent = 'Card Added Successfully!';

                // Close window after 2 seconds
                setTimeout(() => {
                    if (window.opener) {
                        window.opener.postMessage({type: 'card_added', success: true}, '*');
                    }
                    window.close();
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showStatus('error', error.message);
                submitBtn.disabled = false;
                buttonText.textContent = 'Try Again';
            }
        });

        function showStatus(type, message) {
            statusMessage.className = `status-message status-${type}`;
            statusMessage.textContent = message;
            statusMessage.style.display = 'block';
        }
    </script>
</body>
</html>
